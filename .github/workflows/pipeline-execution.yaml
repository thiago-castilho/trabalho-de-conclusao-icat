name: 'Integration Workflow'

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    - cron: '00 4 * * 0-6'

jobs:
  lint_check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Instalando dependências
        run: npm install

      - name: Inspeção de código
        run: npm run lint:format

  unit_tests:
    runs-on: ubuntu-latest
    needs: [lint_check]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Instalando dependências
        run: npm install

      - name: Execução dos testes unitários
        run: npm run test

      - name: Gerando relatório de testes
        run: npm run report
        if: ${{ always() }}

      - name: Salvando relatório
        uses: actions/upload-artifact@v6
        if: ${{ always() }}
        with:
          path: ./mochawesome-report
          name: relatorio-testes-unitarios
